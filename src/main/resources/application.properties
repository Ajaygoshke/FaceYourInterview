spring.application.name=FYI

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# SECURED: Pulls the key from your local machine's environment variables
gemini.api.key=${GEMINI_API_KEY}

gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent

# MySQL config
spring.datasource.url=jdbc:mysql://localhost:3306/fyi_db
spring.datasource.username=root
# SECURED: Database passwords should also never be pushed to GitHub
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# File upload folder
file.upload-dir=uploads

server.tomcat.max-http-header-size=64kb